<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>404 – Siden finnes ikke</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #06162d 0%, #15385e 100%);
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 48px 32px;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    h1 {
      font-size: 72px;
      margin: 0 0 16px;
      color: #06162d;
    }
    h2 {
      font-size: 24px;
      margin: 0 0 16px;
      color: #333;
    }
    p {
      font-size: 16px;
      line-height: 1.6;
      color: #666;
      margin: 0 0 28px;
    }
    a {
      display: inline-block;
      padding: 12px 24px;
      background: #eb3c4a;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.2s;
    }
    a:hover {
      background: #d6364a;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>Siden finnes ikke</h2>
    <p>Siden du søker etter finnes dessverre ikke. Dette kan skyldes en feil i lenken eller at siden har blitt flytta.</p>
    <a href="/">Tilbake til RSW Rapport App</a>
  </div>
</body>
</html>
